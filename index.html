<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermini Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
  header { background: #111118; padding: 14px 20px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 16px; font-weight: 600; color: #fff; }
  .header-right { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #666; }
  .status { width: 8px; height: 8px; border-radius: 50%; background: #555; }
  .status.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.6; font-size: 14px; word-break: break-word; }
  .msg.user { align-self: flex-end; background: linear-gradient(135deg, #1a1a2e, #16162a); border: 1px solid #2a2a4a; }
  .msg.assistant { align-self: flex-start; background: linear-gradient(135deg, #161622, #121220); border: 1px solid #252540; }
  .msg.system { align-self: center; background: transparent; border: none; color: #666; font-size: 12px; text-align: center; }
  .msg.error { align-self: flex-start; background: #2a1a1a; border: 1px solid #4a2a2a; color: #f87171; }
  #input-area { background: #0e0e14; padding: 16px 20px; border-top: 1px solid #1a1a24; display: flex; gap: 10px; }
  #msg-input { flex: 1; background: #14141e; border: 1px solid #252535; border-radius: 10px; padding: 12px 16px; color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s; }
  #msg-input:focus { border-color: #4a4a7a; }
  #msg-input::placeholder { color: #444; }
  #send-btn { background: #4f46e5; color: #fff; border: none; border-radius: 10px; padding: 12px 24px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
  #send-btn:hover { background: #4338ca; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="status" id="status_dot"></div>
    <h1>Hermini</h1>
  </div>
  <div class="header-right" id="conn_info">connecting...</div>
</header>
<div id="chat"></div>
<div id="input-area">
  <input id="msg-input" placeholder="Say something..." autocomplete="off" />
  <button id="send-btn">Send</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('msg-input');
const btn = document.getElementById('send-btn');
const dot = document.getElementById('status_dot');
const info = document.getElementById('conn_info');

let ws = null;
let sessionToken = '';
let gatewayUrl = 'ws://127.0.0.1:18789/';
let connected = false;

// Try to get token from URL
const params = new URLSearchParams(window.location.search);
sessionToken = params.get('token') || '';

// Get gateway URL from config if available
try {
  const cfg = window.parent._herminiConfig || {};
  if (cfg.gatewayUrl) gatewayUrl = cfg.gatewayUrl;
  if (cfg.sessionToken) sessionToken = cfg.sessionToken;
} catch(e) {}

function setConnected(val) {
  connected = val;
  dot.className = `status ${val ? 'connected' : ''}`;
  info.textContent = val ? 'connected' : 'disconnected';
}

function addMsg(text, type, sender) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  if (sender) {
    const s = document.createElement('div');
    s.className = 'sender';
    s.textContent = sender;
    s.style.cssText = 'font-size:11px;color:#888;margin-bottom:4px';
    div.appendChild(s);
  }
  const t = document.createElement('div');
  t.style.cssText = 'white-space:pre-wrap';
  t.textContent = text;
  div.appendChild(t);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function connectWS() {
  if (!sessionToken) {
    addMsg('No session token. Add ?token=YOUR_TOKEN to the URL.', 'error', 'system');
    return;
  }

  const url = gatewayUrl.includes('?') 
    ? `${gatewayUrl}&token=${encodeURIComponent(sessionToken)}`
    : `${gatewayUrl}?token=${encodeURIComponent(sessionToken)}`;

  addMsg('Connecting...', 'system');

  try {
    ws = new WebSocket(url);
  } catch(err) {
    addMsg(`WebSocket error: ${err.message}`, 'error');
    return;
  }

  ws.onopen = () => {
    setConnected(true);
    addMsg('Connected to Hermini', 'system');
    // Authenticate
    ws.send(JSON.stringify({ jsonrpc: '2.0', method: 'auth.challenge', params: { token: sessionToken }, id: 1 }));
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      console.log('WS message:', data);

      if (data.method === 'auth.challenge') {
        // Respond to challenge
        ws.send(JSON.stringify({
          jsonrpc: '2.0',
          method: 'auth.response',
          params: { response: data.params.nonce },
          id: 1
        }));
      } else if (data.method === 'auth.challenge.response') {
        addMsg('Authenticated successfully', 'system');
      } else if (data.method === 'chat.message' || data.method === 'message') {
        addMsg(data.params.content || data.params.text || JSON.stringify(data.params), 'assistant', 'hermini');
      } else if (data.result) {
        // RPC response
        if (data.result.content) {
          addMsg(data.result.content, 'assistant', 'hermini');
        }
      }
    } catch(e) {
      addMsg('Parse error: ' + event.data, 'error');
    }
  };

  ws.onerror = (err) => {
    addMsg('WebSocket error - check console', 'error');
    console.error('WS error', err);
  };

  ws.onclose = () => {
    setConnected(false);
    addMsg('Disconnected', 'system');
  };
}

async function sendMessage(text) {
  if (!text.trim() || !connected || !ws || ws.readyState !== WebSocket.OPEN) {
    addMsg('Not connected', 'error');
    return;
  }

  addMsg(text, 'user', 'you');
  input.value = '';

  try {
    ws.send(JSON.stringify({
      jsonrpc: '2.0',
      method: 'chat.send',
      params: { message: text },
      id: Date.now()
    }));
  } catch(e) {
    addMsg(`Send error: ${e.message}`, 'error');
  }
}

btn.addEventListener('click', () => sendMessage(input.value));
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    btn.click();
  }
});

if (sessionToken) {
  connectWS();
} else {
  addMsg('No session token. Add ?token=YOUR_TOKEN to the URL.', 'error', 'system');
}
</script>
</body>
</html>
